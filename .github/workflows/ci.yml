name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'

jobs:
  build-test-pack:
    name: Build, test, pack and consume
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SmartSelector
        uses: actions/checkout@v7

      - name: Setup supported .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore src/SmartSelector.sln

      - name: Build
        run: dotnet build src/SmartSelector.sln -c Release --no-restore

      - name: Test SmartSelector
        run: >-
          dotnet test src/RoyalCode.SmartSelector.Tests/RoyalCode.SmartSelector.Tests.csproj
          -c Release --no-build --no-restore
          --filter "Category!=KnownLimitation"

      - name: Test Demo integrations
        run: >-
          dotnet test src/RoyalCode.SmartSelector.Demo/RoyalCode.SmartSelector.Demo.csproj
          -c Release --no-build --no-restore

      - name: Pack release artifacts
        shell: bash
        run: |
          set -euo pipefail
          packages="$GITHUB_WORKSPACE/artifacts/packages"
          rm -rf "$packages"
          mkdir -p "$packages"

          dotnet pack src/RoyalCode.SmartSelector/RoyalCode.SmartSelector.csproj \
            -c Release --no-build --no-restore \
            -p:PackageOutputPath="$packages"
          dotnet pack src/RoyalCode.SmartSelector.Generators/RoyalCode.SmartSelector.Generators.csproj \
            -c Release --no-restore \
            -p:PackageOutputPath="$packages"

          mapfile -t runtime_packages < <(find "$packages" -maxdepth 1 -type f -name 'RoyalCode.SmartSelector.[0-9]*.nupkg')
          mapfile -t generator_packages < <(find "$packages" -maxdepth 1 -type f -name 'RoyalCode.SmartSelector.Generators.*.nupkg')
          if [[ ${#runtime_packages[@]} -ne 1 || ${#generator_packages[@]} -ne 1 ]]; then
            echo "Expected exactly one runtime package and one generator package." >&2
            find "$packages" -maxdepth 1 -type f -print >&2
            exit 1
          fi

          runtime_file=$(basename "${runtime_packages[0]}")
          generator_file=$(basename "${generator_packages[0]}")
          runtime_version=${runtime_file#RoyalCode.SmartSelector.}
          runtime_version=${runtime_version%.nupkg}
          generator_version=${generator_file#RoyalCode.SmartSelector.Generators.}
          generator_version=${generator_version%.nupkg}
          if [[ "$runtime_version" != "$generator_version" ]]; then
            echo "Runtime and generator package versions differ." >&2
            exit 1
          fi

          runtime_sha=$(sha256sum "${runtime_packages[0]}" | cut -d' ' -f1)
          generator_sha=$(sha256sum "${generator_packages[0]}" | cut -d' ' -f1)
          jq -n \
            --arg source_sha "$GITHUB_SHA" \
            --arg source_ref "$GITHUB_REF" \
            --arg version "$runtime_version" \
            --arg runtime_file "$runtime_file" \
            --arg runtime_sha "$runtime_sha" \
            --arg generator_file "$generator_file" \
            --arg generator_sha "$generator_sha" \
            '{
              schema: 1,
              source_sha: $source_sha,
              source_ref: $source_ref,
              version: $version,
              packages: [
                { id: "RoyalCode.SmartSelector", file: $runtime_file, sha256: $runtime_sha },
                { id: "RoyalCode.SmartSelector.Generators", file: $generator_file, sha256: $generator_sha }
              ]
            }' > "$packages/release-manifest.json"

      - name: Consume only the produced packages with .NET 8
        shell: bash
        run: |
          set -euo pipefail
          packages="$GITHUB_WORKSPACE/artifacts/packages"
          consumer="$RUNNER_TEMP/smartselector-consumer"
          version=$(jq -r '.version' "$packages/release-manifest.json")
          rm -rf "$consumer"
          mkdir -p "$consumer"

          cat > "$consumer/global.json" <<'JSON'
          {
            "sdk": {
              "version": "8.0.100",
              "rollForward": "latestFeature"
            }
          }
          JSON

          cat > "$consumer/NuGet.Config" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="ci-packages" value="$packages" />
            </packageSources>
          </configuration>
          EOF

          cat > "$consumer/Consumer.csproj" <<EOF
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net8.0</TargetFramework>
              <Nullable>enable</Nullable>
              <ImplicitUsings>enable</ImplicitUsings>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="RoyalCode.SmartSelector" Version="$version" />
              <PackageReference Include="RoyalCode.SmartSelector.Generators" Version="$version"
                                OutputItemType="Analyzer" ReferenceOutputAssembly="false" />
            </ItemGroup>
          </Project>
          EOF

          cat > "$consumer/Program.cs" <<'CS'
          using RoyalCode.SmartSelector;

          namespace PackageConsumer;

          public class Entity
          {
              public int Id { get; set; }
          }

          [AutoSelect<Entity>]
          public partial class EntityDetails
          {
              public int Id { get; set; }
          }

          public static class Program
          {
              public static void Main()
              {
                  var details = EntityDetails.From(new Entity { Id = 42 });
                  if (details.Id != 42)
                      throw new InvalidOperationException("Generated projection returned an unexpected value.");
                  Console.WriteLine("Package consumer OK");
              }
          }
          CS

          dotnet --version
          dotnet restore "$consumer/Consumer.csproj" --configfile "$consumer/NuGet.Config" --no-cache
          dotnet run --project "$consumer/Consumer.csproj" --no-restore

      - name: Upload validated NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: |
            artifacts/packages/RoyalCode.SmartSelector.*.nupkg
            artifacts/packages/release-manifest.json
          if-no-files-found: error
          retention-days: 14

  known-limitations-baseline:
    name: Known limitations baseline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SmartSelector
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/SmartSelector.sln

      - name: Execute known limitations
        shell: pwsh
        run: |
          dotnet test src/RoyalCode.SmartSelector.Tests/RoyalCode.SmartSelector.Tests.csproj `
            -c Release `
            --filter "Category=KnownLimitation" `
            --logger "trx;LogFileName=known-limitations.trx" `
            --results-directory "$env:RUNNER_TEMP/known-limitations"
          Write-Host "Known limitations test exit code: $LASTEXITCODE (failures are expected and validated next)."
          exit 0

      - name: Validate nominal baseline and publish summary
        shell: pwsh
        run: |
          $baseline = @(
            'RoyalCode.SmartSelector.Tests.Tests.GeneratedCodeCompilationTddTests.Generated_code_should_compile_for_a_generic_destination_dto',
            'RoyalCode.SmartSelector.Tests.Tests.GeneratedCodeCompilationTddTests.Generated_code_should_compile_for_a_nested_destination_dto'
          ) | Sort-Object

          $trxPath = "$env:RUNNER_TEMP/known-limitations/known-limitations.trx"
          if (-not (Test-Path -LiteralPath $trxPath)) {
            throw "Known limitations TRX was not produced."
          }

          [xml]$trx = Get-Content -LiteralPath $trxPath
          $results = @($trx.TestRun.Results.UnitTestResult)
          $actual = @($results | ForEach-Object testName | Sort-Object -Unique)
          $unexpected = @($actual | Where-Object { $_ -notin $baseline })
          $missing = @($baseline | Where-Object { $_ -notin $actual })
          $passed = @($results | Where-Object outcome -eq 'Passed' | ForEach-Object testName)
          $notExpectedFailures = @($results | Where-Object outcome -ne 'Failed' | ForEach-Object testName)

          @(
            '## KnownLimitation baseline',
            '',
            "Expected count: $($baseline.Count)",
            "Actual count: $($actual.Count)",
            '',
            '| Test | Outcome |',
            '|---|---|'
          ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
          foreach ($result in $results | Sort-Object testName) {
            "| ``$($result.testName)`` | $($result.outcome) |" |
              Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
          }

          if ($unexpected.Count -gt 0 -or $missing.Count -gt 0 -or
              $passed.Count -gt 0 -or $notExpectedFailures.Count -gt 0 -or
              $actual.Count -ne $baseline.Count) {
            Write-Error "KnownLimitation baseline mismatch. Unexpected=[$($unexpected -join ', ')]; Missing=[$($missing -join ', ')]; Passed=[$($passed -join ', ')]; Non-failures=[$($notExpectedFailures -join ', ')]"
            exit 1
          }

          Write-Host "KnownLimitation baseline is exact: $($actual.Count) expected failures."
