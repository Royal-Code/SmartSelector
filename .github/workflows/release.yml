name: Release NuGet packages

on:
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: Successful CI run ID from main or an authorized semantic-version tag
        required: true
        type: string

permissions:
  actions: read
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'

jobs:
  validate-ci-run:
    name: Validate CI provenance and packages
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.ci-run.outputs.source_sha }}
      source_ref: ${{ steps.ci-run.outputs.source_ref }}
      run_url: ${{ steps.ci-run.outputs.run_url }}
      version: ${{ steps.packages.outputs.version }}
      runtime_file: ${{ steps.packages.outputs.runtime_file }}
      runtime_sha: ${{ steps.packages.outputs.runtime_sha }}
      generator_file: ${{ steps.packages.outputs.generator_file }}
      generator_sha: ${{ steps.packages.outputs.generator_sha }}

    steps:
      - name: Validate successful CI run and authorized ref
        id: ci-run
        uses: actions/github-script@v9
        env:
          CI_RUN_ID: ${{ inputs.ci_run_id }}
        with:
          script: |
            const runIdText = process.env.CI_RUN_ID ?? '';
            if (!/^\d+$/.test(runIdText)) {
              core.setFailed('ci_run_id must contain only digits.');
              return;
            }

            const runId = Number(runIdText);
            const { owner, repo } = context.repo;
            const { data: run } = await github.rest.actions.getWorkflowRun({ owner, repo, run_id: runId });
            const { data: workflow } = await github.rest.actions.getWorkflow({ owner, repo, workflow_id: run.workflow_id });

            if (workflow.path !== '.github/workflows/ci.yml') {
              core.setFailed(`Run ${runId} belongs to ${workflow.path}, not the CI workflow.`);
              return;
            }
            if (run.status !== 'completed' || run.conclusion !== 'success') {
              core.setFailed(`Run ${runId} is not a completed success (status=${run.status}, conclusion=${run.conclusion}).`);
              return;
            }

            const refName = run.head_branch;
            const semanticTag = /^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/.test(refName ?? '');
            if (refName !== 'main' && !semanticTag) {
              core.setFailed(`Run ${runId} ref '${refName}' is neither main nor an authorized semantic-version tag.`);
              return;
            }

            if (refName === 'main') {
              const { data: branch } = await github.rest.repos.getBranch({ owner, repo, branch: 'main' });
              if (branch.commit.sha !== run.head_sha) {
                core.setFailed(`Run SHA ${run.head_sha} is not the current main SHA ${branch.commit.sha}.`);
                return;
              }
            } else {
              const { data: commit } = await github.rest.repos.getCommit({ owner, repo, ref: refName });
              if (commit.sha !== run.head_sha) {
                core.setFailed(`Run SHA ${run.head_sha} does not match tag ${refName} SHA ${commit.sha}.`);
                return;
              }
            }

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}`;
            core.setOutput('source_sha', run.head_sha);
            core.setOutput('source_ref', refName === 'main' ? 'refs/heads/main' : `refs/tags/${refName}`);
            core.setOutput('run_url', runUrl);
            core.info(`Accepted CI run ${runId}: ${refName} @ ${run.head_sha}`);

      - name: Download packages from the selected CI run
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: release
          run-id: ${{ inputs.ci_run_id }}
          github-token: ${{ github.token }}

      - name: Validate manifest, exact files and hashes
        id: packages
        shell: bash
        env:
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          EXPECTED_SOURCE_SHA: ${{ steps.ci-run.outputs.source_sha }}
          EXPECTED_SOURCE_REF: ${{ steps.ci-run.outputs.source_ref }}
          CI_RUN_URL: ${{ steps.ci-run.outputs.run_url }}
        run: |
          set -euo pipefail
          manifest=release/release-manifest.json
          [[ -f "$manifest" ]] || { echo "release-manifest.json is missing." >&2; exit 1; }

          file_count=$(find release -maxdepth 1 -type f | wc -l)
          [[ "$file_count" -eq 3 ]] || { echo "Artifact must contain exactly two packages and one manifest." >&2; find release -maxdepth 1 -type f -print >&2; exit 1; }
          [[ $(jq -r '.schema' "$manifest") == 1 ]] || { echo "Unsupported manifest schema." >&2; exit 1; }
          [[ $(jq -r '.source_sha' "$manifest") == "$EXPECTED_SOURCE_SHA" ]] || { echo "Manifest SHA does not match the selected CI run." >&2; exit 1; }
          [[ $(jq -r '.source_ref' "$manifest") == "$EXPECTED_SOURCE_REF" ]] || { echo "Manifest ref does not match the selected CI run." >&2; exit 1; }
          [[ $(jq '.packages | length' "$manifest") -eq 2 ]] || { echo "Manifest must contain exactly two packages." >&2; exit 1; }

          runtime_file=$(jq -r '.packages[] | select(.id == "RoyalCode.SmartSelector") | .file' "$manifest")
          runtime_sha=$(jq -r '.packages[] | select(.id == "RoyalCode.SmartSelector") | .sha256' "$manifest")
          generator_file=$(jq -r '.packages[] | select(.id == "RoyalCode.SmartSelector.Generators") | .file' "$manifest")
          generator_sha=$(jq -r '.packages[] | select(.id == "RoyalCode.SmartSelector.Generators") | .sha256' "$manifest")
          version=$(jq -r '.version' "$manifest")

          [[ "$runtime_file" =~ ^RoyalCode\.SmartSelector\.[0-9A-Za-z.-]+\.nupkg$ ]] || { echo "Invalid runtime filename." >&2; exit 1; }
          [[ "$generator_file" =~ ^RoyalCode\.SmartSelector\.Generators\.[0-9A-Za-z.-]+\.nupkg$ ]] || { echo "Invalid generator filename." >&2; exit 1; }
          [[ "$runtime_sha" =~ ^[0-9a-f]{64}$ && "$generator_sha" =~ ^[0-9a-f]{64}$ ]] || { echo "Invalid package SHA-256." >&2; exit 1; }
          [[ -f "release/$runtime_file" && -f "release/$generator_file" ]] || { echo "A declared package is missing." >&2; exit 1; }
          [[ $(sha256sum "release/$runtime_file" | cut -d' ' -f1) == "$runtime_sha" ]] || { echo "Runtime package hash mismatch." >&2; exit 1; }
          [[ $(sha256sum "release/$generator_file" | cut -d' ' -f1) == "$generator_sha" ]] || { echo "Generator package hash mismatch." >&2; exit 1; }

          mapfile -t actual_packages < <(find release -maxdepth 1 -type f -name '*.nupkg' -printf '%f\n' | sort)
          mapfile -t declared_packages < <(printf '%s\n' "$runtime_file" "$generator_file" | sort)
          [[ "${actual_packages[*]}" == "${declared_packages[*]}" ]] || { echo "Artifact contains an undeclared package." >&2; exit 1; }

          {
            echo "version=$version"
            echo "runtime_file=$runtime_file"
            echo "runtime_sha=$runtime_sha"
            echo "generator_file=$generator_file"
            echo "generator_sha=$generator_sha"
          } >> "$GITHUB_OUTPUT"

          {
            echo '## NuGet release candidate'
            echo
            echo "- CI run: [$CI_RUN_ID]($CI_RUN_URL)"
            echo "- Source SHA: \`${{ steps.ci-run.outputs.source_sha }}\`"
            echo "- Version: \`$version\`"
            echo "- \`$runtime_file\`: \`$runtime_sha\`"
            echo "- \`$generator_file\`: \`$generator_sha\`"
            echo
            echo 'No project is rebuilt by this release workflow.'
          } >> "$GITHUB_STEP_SUMMARY"

  publish-nuget:
    name: Approve and publish ${{ needs.validate-ci-run.outputs.version }} from ${{ needs.validate-ci-run.outputs.source_sha }}
    needs: validate-ci-run
    runs-on: ubuntu-latest
    environment:
      name: nuget-production
      url: ${{ needs.validate-ci-run.outputs.run_url }}

    steps:
      - name: Download the exact packages from the selected CI run
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: release
          run-id: ${{ inputs.ci_run_id }}
          github-token: ${{ github.token }}

      - name: Recheck approved package hashes
        shell: bash
        run: |
          set -euo pipefail
          [[ $(sha256sum "release/${{ needs.validate-ci-run.outputs.runtime_file }}" | cut -d' ' -f1) == "${{ needs.validate-ci-run.outputs.runtime_sha }}" ]]
          [[ $(sha256sum "release/${{ needs.validate-ci-run.outputs.generator_file }}" | cut -d' ' -f1) == "${{ needs.validate-ci-run.outputs.generator_sha }}" ]]

      - name: Setup .NET CLI
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish approved runtime package
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >-
          dotnet nuget push
          "release/${{ needs.validate-ci-run.outputs.runtime_file }}"
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Publish approved generator package
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >-
          dotnet nuget push
          "release/${{ needs.validate-ci-run.outputs.generator_file }}"
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
